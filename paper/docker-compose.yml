# AlekhDB Paper Reproducibility Package
# Reproduces all experiments from the paper "AlekhDB: Biological-Inspired,
# Local-First Memory for Long-Horizon AI Agents" (AAAI 2027).
#
# Brings up:
#   - alekhdb: the AlekhDB v2 core + benchmarks
#   - ollama: local LLM + embedding server (for Mem0/Zep/Letta baselines)

version: "3.8"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: alekhdb-paper-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 30
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  alekhdb:
    build:
      context: ..
      dockerfile: paper/Dockerfile
    container_name: alekhdb-paper
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_URL=http://ollama:11434
      - NODE_ENV=production
    ports:
      - "3000:3000"  # REST API
      - "8124:8124"  # Mem0 local
      - "8125:8125"  # Zep/Graphiti local
      - "8126:8126"  # Letta local
      - "8123:8123"  # SuperMemory local
    volumes:
      - alekhdb_data:/data
      - ../:/app  # mount source for live experiments
    working_dir: /app
    command: ["bash", "-c", "ollama pull nomic-embed-text && ollama pull qwen3.5:9b && sleep infinity"]

volumes:
  ollama_data:
  alekhdb_data:
